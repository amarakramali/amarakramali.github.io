<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 580" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a0e27"/><stop offset="100%" stop-color="#111833"/></linearGradient>
    <filter id="sh3"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/></filter>
    <marker id="a3B" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 L2,4Z" fill="#5dade2"/></marker>
    <marker id="a3O" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 L2,4Z" fill="#e67e22"/></marker>
    <marker id="a3P" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 L2,4Z" fill="#bb8fce"/></marker>
  </defs>
  <rect width="1100" height="580" fill="url(#bg3)"/>
  <text x="550" y="32" text-anchor="middle" fill="#e0e6ed" font-size="16" font-weight="700" letter-spacing="2">SHEET 3 — MIKROCONTROLLER (ESP32-S3-DEVKITC-1)</text>
  <line x1="80" y1="44" x2="1020" y2="44" stroke="#2e86c1" stroke-width="1" opacity="0.4"/>

  <!-- ESP32 Main Block -->
  <rect x="300" y="70" width="440" height="420" rx="10" fill="#1a3a5c" stroke="#2e86c1" stroke-width="2" filter="url(#sh3)"/>
  <rect x="300" y="70" width="440" height="30" rx="10" fill="#2e86c1" opacity="0.25"/>
  <text x="520" y="91" text-anchor="middle" fill="#5dade2" font-size="13" font-weight="700" letter-spacing="2">ESP32-S3-DEVKITC-1 (N16R8)</text>
  <text x="520" y="120" text-anchor="middle" fill="#e0e6ed" font-size="14" font-weight="700">Dual-Core Xtensa LX7 @ 240 MHz</text>
  <text x="520" y="140" text-anchor="middle" fill="#aab7c4" font-size="10">16 MB Flash | 8 MB PSRAM | WiFi 802.11 b/g/n | BLE 5.0</text>
  <text x="520" y="158" text-anchor="middle" fill="#aab7c4" font-size="10">FreeRTOS | USB-C (Programmierung + 5V Versorgung)</text>

  <!-- Core 0 -->
  <rect x="320" y="175" width="190" height="60" rx="6" fill="#0d1a2e" stroke="#5dade2" stroke-width="1"/>
  <text x="415" y="197" text-anchor="middle" fill="#5dade2" font-size="11" font-weight="700">CORE 0 — Kommunikation</text>
  <text x="415" y="215" text-anchor="middle" fill="#aab7c4" font-size="9">MQTT Client (WiFi)</text>
  <text x="415" y="228" text-anchor="middle" fill="#7f8c8d" font-size="8">Empfängt Setpoints vom PC</text>

  <!-- Core 1 -->
  <rect x="530" y="175" width="190" height="60" rx="6" fill="#0d1a2e" stroke="#5dade2" stroke-width="1"/>
  <text x="625" y="197" text-anchor="middle" fill="#5dade2" font-size="11" font-weight="700">CORE 1 — Regelung</text>
  <text x="625" y="215" text-anchor="middle" fill="#aab7c4" font-size="9">INA226 Polling, PID, UVLO</text>
  <text x="625" y="228" text-anchor="middle" fill="#7f8c8d" font-size="8">Modbus Setpoints, PWM-Steuerung</text>

  <!-- Pin Assignments Table -->
  <rect x="320" y="255" width="400" height="220" rx="5" fill="#0a0e1a" stroke="#333" stroke-width="0.5"/>
  <text x="520" y="275" text-anchor="middle" fill="#5dade2" font-size="10" font-weight="700" letter-spacing="1">PIN-ZUWEISUNGEN</text>

  <!-- UART / Modbus -->
  <text x="335" y="300" fill="#2ecc71" font-size="9" font-weight="700">UART2 (Modbus RTU):</text>
  <text x="335" y="316" fill="#aab7c4" font-size="9">GPIO 4  →  MODBUS_TX (UART2 TX)</text>
  <text x="335" y="332" fill="#aab7c4" font-size="9">GPIO 5  ←  MODBUS_RX (UART2 RX)</text>
  <text x="335" y="348" fill="#aab7c4" font-size="9">GPIO 6  →  MODBUS_DE (RS485 Direction)</text>

  <!-- I2C -->
  <text x="335" y="372" fill="#5dade2" font-size="9" font-weight="700">I²C (Sensoren):</text>
  <text x="335" y="388" fill="#aab7c4" font-size="9">GPIO 21  ↔  I2C_SDA (bidirektional)</text>
  <text x="335" y="404" fill="#aab7c4" font-size="9">GPIO 22  →  I2C_SCL (Clock)</text>

  <!-- PWM -->
  <text x="550" y="300" fill="#e67e22" font-size="9" font-weight="700">PWM (Laststeuerung):</text>
  <text x="550" y="316" fill="#aab7c4" font-size="9">GPIO 17  →  PWM_LOAD (25 kHz)</text>

  <!-- Enable -->
  <text x="550" y="340" fill="#e74c3c" font-size="9" font-weight="700">UVLO Control:</text>
  <text x="550" y="356" fill="#aab7c4" font-size="9">GPIO 18  →  DCDC_EN (Pololu)</text>

  <!-- WiFi -->
  <text x="550" y="380" fill="#bb8fce" font-size="9" font-weight="700">WiFi (intern):</text>
  <text x="550" y="396" fill="#aab7c4" font-size="9">Onboard Antenne</text>
  <text x="550" y="412" fill="#aab7c4" font-size="9">MQTT Broker: PC (LAN)</text>

  <!-- Status LED -->
  <text x="550" y="438" fill="#f1c40f" font-size="9" font-weight="700">Debug:</text>
  <text x="550" y="454" fill="#aab7c4" font-size="9">GPIO 48  →  Onboard RGB LED</text>
  <text x="550" y="468" fill="#aab7c4" font-size="9">UART0 (USB) → Serial Monitor</text>

  <!-- Off-Sheet Ports LEFT -->
  <rect x="30" y="100" width="130" height="40" rx="5" fill="#0d1a2e" stroke="#5dade2" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="95" y="117" text-anchor="middle" fill="#5dade2" font-size="9" font-weight="600">← Sheet 1</text>
  <text x="95" y="132" text-anchor="middle" fill="#7f8c8d" font-size="8">USB 5V / +3V3</text>

  <rect x="30" y="200" width="130" height="55" rx="5" fill="#0d1a2e" stroke="#2ecc71" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="95" y="218" text-anchor="middle" fill="#2ecc71" font-size="9" font-weight="600">→ Sheet 2</text>
  <text x="95" y="234" text-anchor="middle" fill="#7f8c8d" font-size="8">MODBUS_TX (GPIO4)</text>
  <text x="95" y="248" text-anchor="middle" fill="#7f8c8d" font-size="8">MODBUS_RX (GPIO5)</text>

  <!-- Off-Sheet Ports RIGHT -->
  <rect x="880" y="100" width="130" height="55" rx="5" fill="#0d1a2e" stroke="#5dade2" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="945" y="118" text-anchor="middle" fill="#5dade2" font-size="9" font-weight="600">→ Sheet 4</text>
  <text x="945" y="134" text-anchor="middle" fill="#7f8c8d" font-size="8">I2C_SDA (GPIO21)</text>
  <text x="945" y="148" text-anchor="middle" fill="#7f8c8d" font-size="8">I2C_SCL (GPIO22)</text>

  <rect x="880" y="200" width="130" height="40" rx="5" fill="#0d1a2e" stroke="#e67e22" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="945" y="218" text-anchor="middle" fill="#e67e22" font-size="9" font-weight="600">→ Sheet 5</text>
  <text x="945" y="232" text-anchor="middle" fill="#7f8c8d" font-size="8">PWM_LOAD (GPIO17)</text>

  <rect x="880" y="280" width="130" height="40" rx="5" fill="#0d1a2e" stroke="#e74c3c" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="945" y="298" text-anchor="middle" fill="#e74c3c" font-size="9" font-weight="600">→ Sheet 5</text>
  <text x="945" y="312" text-anchor="middle" fill="#7f8c8d" font-size="8">DCDC_EN (GPIO18)</text>

  <rect x="880" y="360" width="130" height="40" rx="5" fill="#0d1a2e" stroke="#bb8fce" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="945" y="378" text-anchor="middle" fill="#bb8fce" font-size="9" font-weight="600">PC (WiFi)</text>
  <text x="945" y="392" text-anchor="middle" fill="#7f8c8d" font-size="8">MQTT Broker</text>

  <!-- Arrows -->
  <line x1="160" y1="120" x2="300" y2="120" stroke="#5dade2" stroke-width="1.5" marker-end="url(#a3B)"/>
  <line x1="160" y1="225" x2="300" y2="310" stroke="#2ecc71" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="740" y1="130" x2="880" y2="127" stroke="#5dade2" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#a3B)"/>
  <line x1="740" y1="220" x2="880" y2="220" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a3O)"/>
  <line x1="740" y1="300" x2="880" y2="300" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="740" y1="380" x2="880" y2="380" stroke="#bb8fce" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#a3P)"/>

  <!-- Note -->
  <rect x="30" y="500" width="1040" height="55" rx="5" fill="#0d1220" stroke="#2e86c1" stroke-width="0.8"/>
  <text x="50" y="520" fill="#5dade2" font-size="10" font-weight="700">Firmware-Architektur (FreeRTOS):</text>
  <text x="50" y="540" fill="#aab7c4" font-size="9">Core 0 Task: MQTT-Subscribe (Setpoints), MQTT-Publish (Telemetrie) → Priorität 1 | Core 1 Task: INA226 Polling (50ms), PID-Regler, UVLO-Check, Modbus-Setpoint → Priorität 2</text>
</svg>
