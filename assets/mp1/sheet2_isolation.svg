<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a0e27"/><stop offset="100%" stop-color="#111833"/></linearGradient>
    <marker id="a2R" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 L2,4Z" fill="#e74c3c"/></marker>
    <marker id="a2G" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 L2,4Z" fill="#2ecc71"/></marker>
    <marker id="a2B" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 L2,4Z" fill="#5dade2"/></marker>
    <marker id="a2O" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 L2,4Z" fill="#f39c12"/></marker>
    <filter id="sh2"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>
  <rect width="1100" height="520" fill="url(#bg2)"/>
  <text x="550" y="32" text-anchor="middle" fill="#e0e6ed" font-size="16" font-weight="700" letter-spacing="2">SHEET 2 — GALVANISCHE TRENNUNG &amp; RS485 KOMMUNIKATION</text>
  <line x1="80" y1="44" x2="1020" y2="44" stroke="#f39c12" stroke-width="1" opacity="0.4"/>

  <!-- Isolation Barrier -->
  <rect x="448" y="60" width="4" height="400" fill="#f39c12" opacity="0.6" rx="1"/>
  <rect x="444" y="60" width="12" height="400" fill="none" stroke="#f39c12" stroke-width="0.5" stroke-dasharray="4,3" opacity="0.3"/>
  <text x="440" y="78" text-anchor="end" fill="#5dade2" font-size="10" font-weight="600">3.3V LOGIK</text>
  <text x="460" y="78" fill="#f39c12" font-size="10" font-weight="600">5V ISOLIERT</text>

  <!-- From Sheet 3 port -->
  <rect x="30" y="120" width="110" height="50" rx="5" fill="#0d1a2e" stroke="#5dade2" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="85" y="142" text-anchor="middle" fill="#5dade2" font-size="10" font-weight="600">← Sheet 3</text>
  <text x="85" y="158" text-anchor="middle" fill="#7f8c8d" font-size="8">MODBUS_TX (GPIO4)</text>

  <rect x="30" y="195" width="110" height="50" rx="5" fill="#0d1a2e" stroke="#5dade2" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="85" y="217" text-anchor="middle" fill="#5dade2" font-size="10" font-weight="600">← Sheet 3</text>
  <text x="85" y="233" text-anchor="middle" fill="#7f8c8d" font-size="8">MODBUS_RX (GPIO5)</text>

  <rect x="30" y="280" width="110" height="50" rx="5" fill="#0d1a2e" stroke="#5dade2" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="85" y="302" text-anchor="middle" fill="#5dade2" font-size="10" font-weight="600">← Sheet 3</text>
  <text x="85" y="318" text-anchor="middle" fill="#7f8c8d" font-size="8">MODBUS_DE (GPIO6)</text>

  <!-- ADUM1201 -->
  <rect x="200" y="100" width="200" height="250" rx="8" fill="#2a2a3e" stroke="#f39c12" stroke-width="1.5" filter="url(#sh2)"/>
  <rect x="200" y="100" width="200" height="26" rx="8" fill="#f39c12" opacity="0.15"/>
  <text x="300" y="118" text-anchor="middle" fill="#f39c12" font-size="11" font-weight="700">ADUM1201ARZ</text>
  <text x="300" y="145" text-anchor="middle" fill="#e0e6ed" font-size="12" font-weight="600">Digital Isolator</text>
  <text x="300" y="163" text-anchor="middle" fill="#aab7c4" font-size="9">2-Kanal, 25 Mbit/s</text>
  <text x="300" y="178" text-anchor="middle" fill="#aab7c4" font-size="9">2.5 kV Isolation</text>

  <!-- ADUM pins left (3.3V side) -->
  <text x="215" y="210" fill="#5dade2" font-size="9" font-weight="600">VDD1</text>
  <text x="215" y="228" fill="#5dade2" font-size="9">← +3V3 (Sheet 1)</text>
  <text x="215" y="252" fill="#5dade2" font-size="9" font-weight="600">VIA (Pin 2)</text>
  <text x="215" y="268" fill="#5dade2" font-size="9">← MODBUS_TX</text>
  <text x="215" y="292" fill="#5dade2" font-size="9" font-weight="600">VOB (Pin 3)</text>
  <text x="215" y="308" fill="#5dade2" font-size="9">→ MODBUS_RX</text>
  <text x="215" y="332" fill="#5dade2" font-size="9" font-weight="600">GND1 (Pin 4)</text>

  <!-- ADUM pins right (5V side) -->
  <text x="340" y="210" fill="#f39c12" font-size="9" font-weight="600">VDD2</text>
  <text x="340" y="228" fill="#f39c12" font-size="9">← +5V_ISO (Sheet 1)</text>
  <text x="340" y="252" fill="#f39c12" font-size="9" font-weight="600">VOA (Pin 7)</text>
  <text x="340" y="268" fill="#f39c12" font-size="9">→ MAX485 DI</text>
  <text x="340" y="292" fill="#f39c12" font-size="9" font-weight="600">VIB (Pin 6)</text>
  <text x="340" y="308" fill="#f39c12" font-size="9">← MAX485 RO</text>
  <text x="340" y="332" fill="#f39c12" font-size="9" font-weight="600">GND2 (Pin 5)</text>

  <!-- Isolation symbol inside ADUM -->
  <line x1="295" y1="190" x2="295" y2="345" stroke="#f39c12" stroke-width="1.5" opacity="0.5"/>
  <line x1="305" y1="190" x2="305" y2="345" stroke="#f39c12" stroke-width="1.5" opacity="0.5"/>

  <!-- Arrows to ADUM -->
  <line x1="140" y1="145" x2="200" y2="258" stroke="#5dade2" stroke-width="1.5" marker-end="url(#a2B)"/>
  <line x1="140" y1="220" x2="200" y2="298" stroke="#5dade2" stroke-width="1.5" marker-end="url(#a2B)"/>

  <!-- MAX485 -->
  <rect x="500" y="110" width="200" height="230" rx="8" fill="#1e2a3a" stroke="#5dade2" stroke-width="1.5" filter="url(#sh2)"/>
  <rect x="500" y="110" width="200" height="26" rx="8" fill="#5dade2" opacity="0.15"/>
  <text x="600" y="128" text-anchor="middle" fill="#5dade2" font-size="11" font-weight="700">MAX485 MODUL</text>
  <text x="600" y="155" text-anchor="middle" fill="#e0e6ed" font-size="12" font-weight="600">RS485 Transceiver</text>
  <text x="600" y="173" text-anchor="middle" fill="#aab7c4" font-size="9">Half-Duplex, 2.5 Mbps</text>

  <text x="515" y="200" fill="#f39c12" font-size="9" font-weight="600">VCC ← +5V_ISO</text>
  <text x="515" y="222" fill="#f39c12" font-size="9" font-weight="600">DI (Pin 4)</text>
  <text x="515" y="238" fill="#f39c12" font-size="9">← ADUM VOA (TX)</text>
  <text x="515" y="258" fill="#f39c12" font-size="9" font-weight="600">RO (Pin 1)</text>
  <text x="515" y="274" fill="#f39c12" font-size="9">→ ADUM VIB (RX)</text>
  <text x="515" y="296" fill="#f39c12" font-size="9" font-weight="600">DE/RE (Pin 2,3)</text>
  <text x="515" y="312" fill="#f39c12" font-size="9">← via ADUM od. tied</text>
  <text x="515" y="330" fill="#f39c12" font-size="9" font-weight="600">GND → GND_ISO</text>

  <!-- Arrows ADUM → MAX485 -->
  <line x1="400" y1="260" x2="500" y2="228" stroke="#f39c12" stroke-width="1.5" marker-end="url(#a2O)"/>
  <line x1="400" y1="300" x2="500" y2="268" stroke="#f39c12" stroke-width="1.5" marker-end="url(#a2O)"/>

  <!-- RS485 Bus Output -->
  <rect x="770" y="140" width="180" height="130" rx="8" fill="#1a2e1a" stroke="#2ecc71" stroke-width="1.5" filter="url(#sh2)"/>
  <rect x="770" y="140" width="180" height="24" rx="8" fill="#2ecc71" opacity="0.15"/>
  <text x="860" y="158" text-anchor="middle" fill="#2ecc71" font-size="10" font-weight="700">RS485 BUS</text>
  <text x="860" y="185" text-anchor="middle" fill="#e0e6ed" font-size="11" font-weight="600">Twisted Pair (J3)</text>
  <text x="860" y="205" text-anchor="middle" fill="#aab7c4" font-size="9">A (Data+) — geschirmt</text>
  <text x="860" y="220" text-anchor="middle" fill="#aab7c4" font-size="9">B (Data−) — geschirmt</text>
  <text x="860" y="240" text-anchor="middle" fill="#2ecc71" font-size="9" font-weight="600">120Ω Termination</text>
  <text x="860" y="258" text-anchor="middle" fill="#7f8c8d" font-size="8">Am RD6006P-seitigen Ende</text>

  <!-- Arrow MAX485 → RS485 -->
  <line x1="700" y1="200" x2="770" y2="200" stroke="#2ecc71" stroke-width="2" marker-end="url(#a2G)"/>
  <text x="735" y="192" text-anchor="middle" fill="#2ecc71" font-size="8">A / B</text>

  <!-- To RD6006P port -->
  <rect x="990" y="170" width="80" height="50" rx="5" fill="#0d1a0d" stroke="#2ecc71" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="1030" y="192" text-anchor="middle" fill="#2ecc71" font-size="10" font-weight="600">→ RD6006P</text>
  <text x="1030" y="208" text-anchor="middle" fill="#7f8c8d" font-size="8">RS485 Port</text>

  <line x1="950" y1="195" x2="990" y2="195" stroke="#2ecc71" stroke-width="1.5" marker-end="url(#a2G)"/>

  <!-- DE/RE Control Note -->
  <rect x="500" y="370" width="450" height="60" rx="5" fill="#0d1220" stroke="#5dade2" stroke-width="0.8"/>
  <text x="520" y="390" fill="#5dade2" font-size="10" font-weight="700">DE/RE Steuerung (Richtungsumschaltung)</text>
  <text x="520" y="408" fill="#aab7c4" font-size="9">Option A: DE/RE über ADUM1201 Kanal 2 (GPIO6 steuert Richtung)</text>
  <text x="520" y="423" fill="#aab7c4" font-size="9">Option B: DE/RE zusammen auf +5V_ISO (permanent Senden) — nur wenn Half-Duplex reicht</text>

  <!-- Stütz-C Note -->
  <rect x="30" y="390" width="350" height="80" rx="5" fill="#0d1220" stroke="#333" stroke-width="0.5"/>
  <text x="50" y="410" fill="#aab7c4" font-size="9" font-weight="600">📌 Stützkondensatoren auf diesem Sheet:</text>
  <text x="50" y="428" fill="#7f8c8d" font-size="9">• 100nF + 10µF an ADUM1201 VDD1 (3.3V-Seite)</text>
  <text x="50" y="444" fill="#7f8c8d" font-size="9">• 100nF + 10µF an ADUM1201 VDD2 (5V-Seite)</text>
  <text x="50" y="460" fill="#7f8c8d" font-size="9">• 100nF an MAX485 VCC</text>

  <!-- Signal flow summary -->
  <rect x="30" y="480" width="1040" height="28" rx="4" fill="#0d1220" stroke="#2e86c1" stroke-width="0.5"/>
  <text x="550" y="499" text-anchor="middle" fill="#aab7c4" font-size="9">Signalfluss: ESP32 GPIO4 (TX) → ADUM1201 VIA → VOA → MAX485 DI → RS485 A/B → RD6006P  |  RD6006P → RS485 A/B → MAX485 RO → ADUM1201 VIB → VOB → ESP32 GPIO5 (RX)</text>
</svg>
