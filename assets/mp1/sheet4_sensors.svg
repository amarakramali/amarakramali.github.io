<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a0e27"/><stop offset="100%" stop-color="#111833"/></linearGradient>
    <filter id="sh4"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/></filter>
    <marker id="a4B" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 L2,4Z" fill="#5dade2"/></marker>
    <marker id="a4R" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 L2,4Z" fill="#e74c3c"/></marker>
  </defs>
  <rect width="1100" height="600" fill="url(#bg4)"/>
  <text x="550" y="32" text-anchor="middle" fill="#e0e6ed" font-size="16" font-weight="700" letter-spacing="2">SHEET 4 — MESSTECHNIK (3× INA226 + I²C BUS)</text>
  <line x1="80" y1="44" x2="1020" y2="44" stroke="#5dade2" stroke-width="1" opacity="0.4"/>

  <!-- I2C Bus Backbone -->
  <line x1="100" y1="90" x2="100" y2="530" stroke="#5dade2" stroke-width="2.5" opacity="0.6"/>
  <line x1="106" y1="90" x2="106" y2="530" stroke="#3498db" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,3"/>
  <text x="70" y="85" fill="#5dade2" font-size="10" font-weight="700">SDA</text>
  <text x="112" y="85" fill="#3498db" font-size="10" font-weight="700">SCL</text>

  <!-- From Sheet 3 -->
  <rect x="30" y="62" width="160" height="26" rx="4" fill="#0d1a2e" stroke="#5dade2" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="110" y="79" text-anchor="middle" fill="#5dade2" font-size="9" font-weight="600">← Sheet 3: GPIO21/22</text>

  <!-- Pull-ups -->
  <rect x="140" y="98" width="130" height="55" rx="5" fill="#0d1220" stroke="#5dade2" stroke-width="0.8"/>
  <text x="205" y="116" text-anchor="middle" fill="#5dade2" font-size="10" font-weight="700">Pull-Up (1×)</text>
  <text x="205" y="133" text-anchor="middle" fill="#aab7c4" font-size="9">4.7kΩ → +3V3 (SDA)</text>
  <text x="205" y="147" text-anchor="middle" fill="#aab7c4" font-size="9">4.7kΩ → +3V3 (SCL)</text>

  <!-- ═══ INA226 #1 — Erzeugung ═══ -->
  <rect x="300" y="80" width="750" height="130" rx="8" fill="#1a2e44" stroke="#2ecc71" stroke-width="1.5" filter="url(#sh4)"/>
  <rect x="300" y="80" width="750" height="24" rx="8" fill="#2ecc71" opacity="0.15"/>
  <text x="675" y="98" text-anchor="middle" fill="#2ecc71" font-size="12" font-weight="700">INA226 #1 — ERZEUGUNG (Ausgang RD6006P → Supercap)</text>

  <text x="320" y="125" fill="#5dade2" font-size="9" font-weight="600">I²C: 0x40</text>
  <text x="320" y="140" fill="#aab7c4" font-size="9">A0 = GND, A1 = GND</text>

  <text x="470" y="125" fill="#aab7c4" font-size="9" font-weight="600">Shunt: 100mΩ (onboard)</text>
  <text x="470" y="140" fill="#aab7c4" font-size="9">Messung: V_PV, I_PV, P_PV</text>

  <text x="670" y="125" fill="#aab7c4" font-size="9" font-weight="600">EMV-Filter:</text>
  <text x="670" y="140" fill="#aab7c4" font-size="9">100pF C0G an SDA + SCL Pin</text>

  <!-- Power path through INA226 #1 -->
  <rect x="850" y="115" width="65" height="22" rx="3" fill="#1a2e1a" stroke="#e74c3c" stroke-width="0.8"/>
  <text x="882" y="130" text-anchor="middle" fill="#e74c3c" font-size="8" font-weight="600">IN+ → OUT+</text>
  <rect x="850" y="145" width="65" height="22" rx="3" fill="#1a2e1a" stroke="#e74c3c" stroke-width="0.8"/>
  <text x="882" y="160" text-anchor="middle" fill="#e74c3c" font-size="8" font-weight="600">IN− → OUT−</text>
  <!-- Power port labels -->
  <text x="930" y="130" fill="#e74c3c" font-size="8">→ Sheet 6 (SUPERCAP+)</text>
  <text x="930" y="160" fill="#e74c3c" font-size="8">→ Sheet 6 (SUPERCAP−)</text>
  <text x="780" y="130" fill="#e74c3c" font-size="8">Sheet 1 ←</text>

  <!-- I2C connection line #1 -->
  <line x1="106" y1="145" x2="300" y2="145" stroke="#5dade2" stroke-width="1.3" stroke-dasharray="3,2" marker-end="url(#a4B)"/>

  <!-- ═══ INA226 #2 — Speicher ═══ -->
  <rect x="300" y="240" width="750" height="130" rx="8" fill="#1a2e44" stroke="#f1c40f" stroke-width="1.5" filter="url(#sh4)"/>
  <rect x="300" y="240" width="750" height="24" rx="8" fill="#f1c40f" opacity="0.12"/>
  <text x="675" y="258" text-anchor="middle" fill="#f1c40f" font-size="12" font-weight="700">INA226 #2 — SPEICHER (Supercap-Ausgang → Step-Up-Eingang)</text>

  <text x="320" y="285" fill="#5dade2" font-size="9" font-weight="600">I²C: 0x41</text>
  <text x="320" y="300" fill="#aab7c4" font-size="9">A0 = VS, A1 = GND</text>

  <text x="470" y="285" fill="#aab7c4" font-size="9" font-weight="600">Shunt: 100mΩ (onboard)</text>
  <text x="470" y="300" fill="#aab7c4" font-size="9">Messung: V_SC, I_SC, P_SC</text>

  <text x="670" y="285" fill="#aab7c4" font-size="9" font-weight="600">EMV-Filter:</text>
  <text x="670" y="300" fill="#aab7c4" font-size="9">100pF C0G an SDA + SCL Pin</text>

  <text x="320" y="322" fill="#e74c3c" font-size="9" font-weight="600">⚠ Kritisch: Liefert V_SC für Software-UVLO</text>
  <text x="320" y="338" fill="#aab7c4" font-size="9">ESP32 liest V_SC alle 50ms → Abschaltung bei &lt; 2.0V</text>

  <rect x="850" y="275" width="65" height="22" rx="3" fill="#1a2e1a" stroke="#e74c3c" stroke-width="0.8"/>
  <text x="882" y="290" text-anchor="middle" fill="#e74c3c" font-size="8" font-weight="600">IN+ → OUT+</text>
  <rect x="850" y="305" width="65" height="22" rx="3" fill="#1a2e1a" stroke="#e74c3c" stroke-width="0.8"/>
  <text x="882" y="320" text-anchor="middle" fill="#e74c3c" font-size="8" font-weight="600">IN− → OUT−</text>
  <text x="930" y="290" fill="#e74c3c" font-size="8">→ Sheet 5 (POLOLU_IN+)</text>
  <text x="930" y="320" fill="#e74c3c" font-size="8">→ Sheet 5 (POLOLU_IN−)</text>
  <text x="780" y="290" fill="#e74c3c" font-size="8">Sheet 6 ←</text>

  <line x1="106" y1="305" x2="300" y2="305" stroke="#5dade2" stroke-width="1.3" stroke-dasharray="3,2" marker-end="url(#a4B)"/>

  <!-- ═══ INA226 #3 — Last ═══ -->
  <rect x="300" y="400" width="750" height="130" rx="8" fill="#1a2e44" stroke="#e74c3c" stroke-width="1.5" filter="url(#sh4)"/>
  <rect x="300" y="400" width="750" height="24" rx="8" fill="#e74c3c" opacity="0.12"/>
  <text x="675" y="418" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="700">INA226 #3 — LAST (Step-Up-Ausgang → MOSFET → Lüfter)</text>

  <text x="320" y="445" fill="#5dade2" font-size="9" font-weight="600">I²C: 0x44</text>
  <text x="320" y="460" fill="#aab7c4" font-size="9">A0 = GND, A1 = VS</text>

  <text x="470" y="445" fill="#aab7c4" font-size="9" font-weight="600">Shunt: 100mΩ (onboard)</text>
  <text x="470" y="460" fill="#aab7c4" font-size="9">Messung: V_Load, I_Load, P_Load</text>

  <text x="670" y="445" fill="#aab7c4" font-size="9" font-weight="600">EMV-Filter:</text>
  <text x="670" y="460" fill="#aab7c4" font-size="9">100pF C0G an SDA + SCL Pin</text>

  <text x="320" y="482" fill="#2ecc71" font-size="9" font-weight="600">→ PID-Feedback für Closed-Loop-Laststeuerung</text>
  <text x="320" y="498" fill="#aab7c4" font-size="9">P_ist (INA226 #3) vs. P_soll (BDEW Profil) → PWM-Korrektur</text>

  <rect x="850" y="435" width="65" height="22" rx="3" fill="#1a2e1a" stroke="#e74c3c" stroke-width="0.8"/>
  <text x="882" y="450" text-anchor="middle" fill="#e74c3c" font-size="8" font-weight="600">IN+ → OUT+</text>
  <rect x="850" y="465" width="65" height="22" rx="3" fill="#1a2e1a" stroke="#e74c3c" stroke-width="0.8"/>
  <text x="882" y="480" text-anchor="middle" fill="#e74c3c" font-size="8" font-weight="600">IN− → OUT−</text>
  <text x="930" y="450" fill="#e74c3c" font-size="8">→ Sheet 5 (LOAD+)</text>
  <text x="930" y="480" fill="#e74c3c" font-size="8">→ Sheet 5 (LOAD−)</text>
  <text x="780" y="450" fill="#e74c3c" font-size="8">Sheet 5 ←</text>

  <line x1="106" y1="465" x2="300" y2="465" stroke="#5dade2" stroke-width="1.3" stroke-dasharray="3,2" marker-end="url(#a4B)"/>

  <!-- Summary -->
  <rect x="30" y="548" width="1040" height="35" rx="5" fill="#0d1220" stroke="#5dade2" stroke-width="0.8"/>
  <text x="550" y="570" text-anchor="middle" fill="#aab7c4" font-size="9">I²C Bus: 100 kHz | Pull-ups: 1× 4.7kΩ (SDA+SCL) → +3V3 | EMV: 6× 100pF C0G (je 2 pro INA226) | Max. Leitungslänge: 15 cm | Polling: alle 50 ms (6 Register-Reads = ~3 ms)</text>
</svg>
